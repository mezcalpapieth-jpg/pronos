<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercado — PRONOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/sections.css" />

  <style>
    /* ── Page Layout ───────────────────────────────────────────── */
    .market-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px 80px;
    }

    /* ── Back Button ────────────────────────────────────────────── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 24px 0 20px;
      transition: color 0.15s;
      cursor: pointer;
      background: none;
      border: none;
    }
    .back-btn:hover { color: var(--text-secondary); }
    .back-btn svg { width: 14px; height: 14px; }

    /* ── Market Header ──────────────────────────────────────────── */
    .mkt-header {
      padding: 0 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .mkt-header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .mkt-icon {
      font-size: 32px;
      line-height: 1;
    }
    .mkt-cat-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
    }
    .mkt-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: 0.02em;
      line-height: 1.05;
      color: var(--text-primary);
      margin-bottom: 16px;
    }
    .mkt-pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .mkt-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      background: var(--surface1);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 20px;
    }
    .mkt-pill .dot-live {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-dot 1.4s infinite;
    }

    /* ── Two-column layout ──────────────────────────────────────── */
    .market-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    /* ── Left Column ────────────────────────────────────────────── */
    .market-main {}

    /* ── Chart Section ──────────────────────────────────────────── */
    .chart-section {
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .chart-headline {
      font-family: var(--font-display);
      font-size: 52px;
      letter-spacing: 0.02em;
      color: var(--green);
      line-height: 1;
      margin-bottom: 4px;
    }
    .chart-headline-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .chart-time-btns {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }
    .chart-time-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chart-time-btn:hover {
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .chart-time-btn.active {
      color: var(--green);
      background: var(--green-dim);
      border-color: var(--border-active);
    }
    .chart-wrap {
      position: relative;
    }
    .chart-svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .chart-x-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    /* ── Outcome Buttons ────────────────────────────────────────── */
    .outcome-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .outcome-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 16px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface1);
      cursor: pointer;
      transition: all 0.15s;
    }
    .outcome-btn.yes {
      border-color: rgba(0, 232, 122, 0.25);
    }
    .outcome-btn.yes:hover {
      background: var(--green-dim);
      border-color: var(--border-active);
    }
    .outcome-btn.no {
      border-color: rgba(255, 69, 69, 0.2);
    }
    .outcome-btn.no:hover {
      background: var(--red-dim);
      border-color: rgba(255, 69, 69, 0.4);
    }
    .outcome-btn-pct {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .outcome-btn.yes .outcome-btn-pct { color: var(--green); }
    .outcome-btn.no  .outcome-btn-pct { color: var(--red); }
    .outcome-btn-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .outcome-btn-hint {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Multi-outcome (3+ options) */
    .outcome-row.multi .outcome-btn {
      border-color: var(--border);
    }
    .outcome-row.multi .outcome-btn:hover {
      background: var(--surface2);
      border-color: rgba(245, 200, 66, 0.3);
    }
    .outcome-row.multi .outcome-btn-pct {
      color: var(--gold);
    }

    /* ── Tabs ────────────────────────────────────────────────────── */
    .tabs-section {
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .tabs-nav {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 14px 0;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text-secondary); }
    .tab-btn.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }
    .tab-pane {
      display: none;
      padding: 24px;
    }
    .tab-pane.active { display: block; }

    /* Reglas tab */
    .rules-block {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .rule-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .rule-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--green);
      background: var(--green-dim);
      border: 1px solid rgba(0,232,122,0.2);
      border-radius: 4px;
      padding: 2px 8px;
      min-width: 28px;
      text-align: center;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .rule-text {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Contexto tab */
    .context-block {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .context-block p { margin-bottom: 12px; }
    .context-block p:last-child { margin-bottom: 0; }
    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      margin-bottom: 14px;
    }

    /* Actividad tab */
    .activity-feed {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .activity-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .activity-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .activity-text {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .activity-text .username {
      color: var(--text-primary);
      font-weight: 500;
    }
    .activity-text .action-buy { color: var(--green); }
    .activity-text .action-sell { color: var(--red); }
    .activity-text .outcome-yes { color: var(--green); }
    .activity-text .outcome-no { color: var(--red); }
    .activity-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── Right Sidebar ───────────────────────────────────────────── */
    .market-sidebar {
      position: sticky;
      top: 80px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Bet Panel */
    .bet-panel {
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .bet-panel-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .bet-panel-outcomes {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .bet-panel-opt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .bet-panel-opt:hover {
      border-color: var(--border-active);
      background: var(--green-dim);
    }
    .bet-panel-opt-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .bet-panel-opt-pct {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--green);
    }
    .bet-panel-cta {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      background: var(--green);
      color: #000;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: opacity 0.15s;
      border: none;
    }
    .bet-panel-cta:hover { opacity: 0.9; }
    .bet-panel-note {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 10px;
    }

    /* Related Markets */
    .related-section {
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .related-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .related-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .related-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      text-decoration: none;
    }
    .related-item:hover { background: var(--surface2); }
    .related-item-icon {
      font-size: 18px;
      flex-shrink: 0;
    }
    .related-item-body {
      flex: 1;
      min-width: 0;
    }
    .related-item-title {
      font-size: 12px;
      color: var(--text-primary);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .related-item-pct {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .related-item-pct.yes-color { color: var(--green); }
    .related-item-pct.no-color  { color: var(--red); }

    /* ── Not Found State ────────────────────────────────────────── */
    .not-found {
      text-align: center;
      padding: 80px 24px;
    }
    .not-found-icon { font-size: 48px; margin-bottom: 16px; }
    .not-found-title {
      font-family: var(--font-display);
      font-size: 36px;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .not-found-sub {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .market-layout {
        grid-template-columns: 1fr;
      }
      .market-sidebar {
        position: static;
      }
      .market-page {
        padding: 0 16px 60px;
      }
    }
    @media (max-width: 600px) {
      .chart-headline { font-size: 40px; }
      .mkt-title { font-size: 26px; }
    }

    /* ── Nav override for market page (sticky) ──────────────────── */
    #nav {
      position: sticky;
      top: 0;
      z-index: 100;
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <a href="/" class="nav-logo">PRONOS<span class="green-dot"></span></a>
  <div class="nav-links">
    <a href="/#market">El mercado</a>
    <a href="/portfolio">Portafolio</a>
    <a href="/#how-it-works">Cómo funciona</a>
    <div id="navWalletArea">
      <button class="btn-nav-cta" onclick="alert('Conectar wallet — próximamente')">Conectar wallet</button>
    </div>
  </div>
</nav>

<!-- PAGE -->
<div class="market-page" id="marketPage">

  <!-- BACK -->
  <button class="back-btn" onclick="location.href='/#market'">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 2L4 7l5 5"/>
    </svg>
    Todos los mercados
  </button>

  <!-- Dynamic content injected by market.js -->
  <div id="marketContent">
    <div class="not-found">
      <div class="not-found-icon">⏳</div>
      <div class="not-found-title">Cargando mercado…</div>
    </div>
  </div>

</div>

<!-- Data & logic -->
<script src="js/markets.js"></script>
<script src="js/market.js"></script>

</body>
</html>
